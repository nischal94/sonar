name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

# Categories mirror the Keep-a-Changelog sections used in CHANGELOG.md.
# Release-drafter picks a category by PR label; the autolabeler below
# assigns labels from PR titles using Conventional Commits prefixes.
categories:
  - title: '🚀 Added'
    labels:
      - 'feat'
      - 'feature'
      - 'enhancement'
  - title: '🔐 Security'
    labels:
      - 'security'
  - title: '🐛 Fixed'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '🧹 Changed'
    labels:
      - 'refactor'
      - 'perf'
  - title: '📚 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '🧪 Tests'
    labels:
      - 'test'
      - 'tests'
  - title: '🔧 Chores & CI'
    labels:
      - 'chore'
      - 'ci'
      - 'dependencies'

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'

# Version bumps follow SemVer. `breaking` is a manual label for major bumps.
version-resolver:
  major:
    labels:
      - 'breaking'
      - 'major'
  minor:
    labels:
      - 'feat'
      - 'feature'
      - 'minor'
  patch:
    labels:
      - 'fix'
      - 'bugfix'
      - 'patch'
      - 'chore'
      - 'docs'
      - 'refactor'
      - 'security'
      - 'test'
  default: patch

# Autolabel PRs from their title using Conventional Commits prefixes.
# A PR titled `fix(auth): require exp/sub` will be labeled `fix` automatically.
autolabeler:
  - label: 'feat'
    title:
      - '/^feat(\(.+\))?!?:/'
  - label: 'fix'
    title:
      - '/^fix(\(.+\))?!?:/'
  - label: 'docs'
    title:
      - '/^docs(\(.+\))?!?:/'
  - label: 'refactor'
    title:
      - '/^refactor(\(.+\))?!?:/'
  - label: 'test'
    title:
      - '/^test(\(.+\))?!?:/'
  - label: 'chore'
    title:
      - '/^chore(\(.+\))?!?:/'
  - label: 'perf'
    title:
      - '/^perf(\(.+\))?!?:/'
  - label: 'ci'
    title:
      - '/^ci(\(.+\))?!?:/'
  - label: 'security'
    title:
      - '/^security(\(.+\))?!?:/'
      - '/\b(security|CVE|vulnerab|xss|sqli|rce)\b/i'
  - label: 'breaking'
    title:
      - '/^[a-z]+(\(.+\))?!:/'
      - '/\bBREAKING[ _]CHANGE\b/'

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog:** https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
