name: Release Drafter

# Runs on every push to main (to update the draft release) and on every PR
# event (so the autolabeler can label PRs from conventional commit titles
# before they merge). The combination means: label → merge → draft release
# auto-updates with the merged PR under the right category, zero manual steps.
#
# A release is *drafted*, not published. When it's time to ship, a human
# publishes the draft from the GitHub Releases UI.

on:
  push:
    branches:
      - main
  # `pull_request` (not `pull_request_target`) — the autolabeler only reads the
  # PR title, it never checks out PR code, and using the safer trigger avoids
  # the well-known fork-PR injection vector `pull_request_target` opens up.
  # Forked-PR labeling is lost; we accept that since this is a solo-maintained
  # public repo and release-drafter on `push: main` still categorizes correctly
  # from whatever label the human applies on merge.
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: read

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
