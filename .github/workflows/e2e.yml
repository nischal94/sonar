name: E2E (Playwright)

# Layer 6 of Cherny's verification ladder. Runs the Playwright specs in
# e2e/tests/ against a full stack (backend API + frontend preview) brought
# up inside the runner. Separate from ci.yml so frontend-only or
# docs-only changes don't pay the ~3-min E2E cost.
#
# Runs:
#   - on pull_request when frontend/**, backend/**, or e2e/** changes
#   - on push to main (status check / regression sentinel)
# Skipped automatically when the PR touches only docs, workflows, or tests.

on:
  pull_request:
    paths:
      - "frontend/**"
      - "backend/**"
      - "e2e/**"
      - ".github/workflows/e2e.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "backend/**"
      - "e2e/**"

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: E2E — Playwright (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sonar
          POSTGRES_PASSWORD: sonar
          POSTGRES_DB: sonar
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://sonar:sonar@localhost:5432/sonar
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-e2e-secret-key-not-for-prod-do-not-use-32chars
      OPENAI_API_KEY: placeholder-openai-key
      GROQ_API_KEY: placeholder-groq-key
      SENDGRID_API_KEY: placeholder-sendgrid-key
      SENDGRID_FROM_EMAIL: ci@example.com
      TWILIO_ACCOUNT_SID: placeholder-twilio-sid
      TWILIO_AUTH_TOKEN: placeholder-twilio-token
      TWILIO_WHATSAPP_FROM: "+10000000000"
      TELEGRAM_BOT_TOKEN: placeholder-telegram-token
      APIFY_API_TOKEN: placeholder-apify-token
      EXTENSION_VERSION: 1.0.0

    steps:
      - uses: actions/checkout@v6

      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.12"

      - name: Install Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            e2e/package-lock.json

      # Backend
      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --all-extras

      - name: Migrate database
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Start backend API (background)
        working-directory: backend
        run: |
          uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo $! > /tmp/api.pid
          for i in {1..30}; do
            curl -sf http://localhost:8000/health && break
            sleep 1
          done
          curl -sf http://localhost:8000/health || (echo "API failed to start" && exit 1)

      # Frontend
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          # The preview server is on 5173; proxy API calls to the running backend.
          VITE_API_BASE_URL: http://localhost:8000
        run: npm run build

      - name: Start frontend preview (background)
        working-directory: frontend
        run: |
          npx vite preview --host 0.0.0.0 --port 5173 &
          echo $! > /tmp/frontend.pid
          for i in {1..20}; do
            curl -sf http://localhost:5173 && break
            sleep 1
          done
          curl -sf http://localhost:5173 || (echo "Frontend failed to start" && exit 1)

      # Playwright
      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        env:
          SONAR_FRONTEND_URL: http://localhost:5173
          SONAR_BACKEND_URL: http://localhost:8000
        run: npm test

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 14

      - name: Upload test results (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: e2e/test-results/
          retention-days: 14

      - name: Stop backend + frontend
        if: always()
        run: |
          kill $(cat /tmp/api.pid) 2>/dev/null || true
          kill $(cat /tmp/frontend.pid) 2>/dev/null || true
