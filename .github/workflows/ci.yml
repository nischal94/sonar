name: CI

# Runs on every PR and every push to main. Four jobs:
#   1. backend-test     — pytest against real Postgres+pgvector+Redis services
#   2. backend-lint     — ruff check + format (advisory/non-blocking for now;
#                         will tighten once the baseline is clean)
#   3. frontend-build   — npm ci + vite build (tsc runs as part of npm build)
#   4. docker-backend   — docker buildx build of backend image (sanity check)
#
# Required status checks on main will be enabled once this workflow has a
# stable green baseline — track in TODO.md.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend — tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sonar
          POSTGRES_PASSWORD: sonar
          POSTGRES_DB: sonar
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Service hostname is localhost in Actions (not `postgres`/`redis` like
      # docker-compose, because the job runs on the runner, not in a container)
      DATABASE_URL: postgresql+asyncpg://sonar:sonar@localhost:5432/sonar
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-prod-do-not-use-32chars
      OPENAI_API_KEY: placeholder-openai-key
      GROQ_API_KEY: placeholder-groq-key
      RESEND_API_KEY: placeholder-resend-key
      RESEND_FROM_EMAIL: ci@example.com
      TWILIO_ACCOUNT_SID: placeholder-twilio-sid
      TWILIO_AUTH_TOKEN: placeholder-twilio-token
      TWILIO_WHATSAPP_FROM: "+10000000000"
      TELEGRAM_BOT_TOKEN: placeholder-telegram-token
      APIFY_API_TOKEN: placeholder-apify-token
      EXTENSION_VERSION: 1.0.0
    steps:
      - uses: actions/checkout@v6
      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras
      - name: Create sonar_test database + vector extension
        env:
          PGPASSWORD: sonar
        run: |
          psql -h localhost -U sonar -d sonar -c "CREATE EXTENSION IF NOT EXISTS vector;"
          psql -h localhost -U sonar -d sonar -c "CREATE DATABASE sonar_test;"
          psql -h localhost -U sonar -d sonar_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run migrations against sonar DB
        working-directory: backend
        run: uv run alembic upgrade head
      - name: Run pytest
        working-directory: backend
        run: uv run pytest -q

  backend-lint:
    name: Backend — ruff (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.12"
      - name: Ruff check (advisory — does not block PRs until baseline is clean)
        working-directory: backend
        continue-on-error: true
        run: uv tool run --from ruff ruff check .
      - name: Ruff format check (advisory)
        working-directory: backend
        continue-on-error: true
        run: uv tool run --from ruff ruff format --check .

  frontend-build:
    name: Frontend — tsc + vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # `npm run build` already chains `tsc && vite build` per package.json —
      # so this single step covers both type-checking and the bundled output.
      - run: npm run build

  docker-backend:
    name: Docker — backend image build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build backend image (sanity check — no push)
        uses: docker/build-push-action@v7
        with:
          context: backend
          push: false
          tags: sonar-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
