name: CI

# Runs on every PR and every push to main. Four jobs:
#   1. backend-test     — pytest against real Postgres+pgvector+Redis services
#   2. backend-lint     — ruff check + format (advisory/non-blocking for now;
#                         will tighten once the baseline is clean)
#   3. frontend-build   — npm ci + vite build (tsc runs as part of npm build)
#   4. docker-backend   — docker buildx build of backend image (sanity check)
#
# Required status checks on main will be enabled once this workflow has a
# stable green baseline — track in TODO.md.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend — tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: sonar
          POSTGRES_PASSWORD: sonar
          POSTGRES_DB: sonar
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Service hostname is localhost in Actions (not `postgres`/`redis` like
      # docker-compose, because the job runs on the runner, not in a container)
      DATABASE_URL: postgresql+asyncpg://sonar:sonar@localhost:5432/sonar
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-not-for-prod-do-not-use-32chars
      OPENAI_API_KEY: placeholder-openai-key
      GROQ_API_KEY: placeholder-groq-key
      RESEND_API_KEY: placeholder-resend-key
      RESEND_FROM_EMAIL: ci@example.com
      TWILIO_ACCOUNT_SID: placeholder-twilio-sid
      TWILIO_AUTH_TOKEN: placeholder-twilio-token
      TWILIO_WHATSAPP_FROM: "+10000000000"
      TELEGRAM_BOT_TOKEN: placeholder-telegram-token
      APIFY_API_TOKEN: placeholder-apify-token
      EXTENSION_VERSION: 1.0.0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras
      - name: Create sonar_test database + vector extension
        env:
          PGPASSWORD: sonar
        run: |
          psql -h localhost -U sonar -d sonar -c "CREATE EXTENSION IF NOT EXISTS vector;"
          psql -h localhost -U sonar -d sonar -c "CREATE DATABASE sonar_test;"
          psql -h localhost -U sonar -d sonar_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Run migrations against sonar DB
        working-directory: backend
        run: uv run alembic upgrade head
      - name: Run pytest
        working-directory: backend
        run: uv run pytest -q

  backend-lint:
    name: Backend — ruff (advisory)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
      - name: Ruff check (advisory — does not block PRs until baseline is clean)
        working-directory: backend
        continue-on-error: true
        run: uv tool run --from ruff ruff check .
      - name: Ruff format check (advisory)
        working-directory: backend
        continue-on-error: true
        run: uv tool run --from ruff ruff format --check .

  frontend-build:
    name: Frontend — tsc + vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # `npm run build` already chains `tsc && vite build` per package.json —
      # so this single step covers both type-checking and the bundled output.
      - run: npm run build

  docker-backend:
    name: Docker — backend image build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # for SARIF upload from Trivy image scan
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Build backend image (sanity check — no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: backend
          push: false
          load: true  # load into local docker so Trivy can scan it
          tags: sonar-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Trivy image-CVE scan reuses the artifact already in memory from the
      # build step above. Advisory while the baseline is established —
      # SARIF results land in Security tab → Code scanning alerts under
      # category "trivy-image" so they don't collide with the filesystem
      # scan run in trivy.yml (category "trivy-fs").
      - name: Trivy image scan (advisory)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        continue-on-error: true
        with:
          image-ref: sonar-backend:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
      - name: Upload Trivy image-scan SARIF
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
