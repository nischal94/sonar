version: 2

# Grouping converts update bursts into 1-3 grouped PRs/week per ecosystem
# instead of N separate PRs. Major upgrades stay individual (breaking
# changes deserve individual review). See
# nischal94/repo-template/docs/SECURITY-OPERATIONS.md §5 for the rationale.

updates:
  # Backend Python dependencies (pyproject.toml). Dependabot updates the
  # version pins in pyproject.toml; uv.lock is regenerated as part of merging
  # (manual `uv sync --all-extras` in the api container if needed).
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      pip-security:
        applies-to: security-updates
        patterns: ["*"]
      pip-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  # Frontend npm dependencies.
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      npm-security:
        applies-to: security-updates
        patterns: ["*"]
      npm-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  # E2E npm dependencies (Playwright + test deps live separately).
  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "e2e"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      e2e-security:
        applies-to: security-updates
        patterns: ["*"]
      e2e-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  # GitHub Actions workflow dependencies.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      gh-actions:
        applies-to: version-updates
        patterns: ["*"]

  # Backend Dockerfile base-image updates.
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"
    groups:
      docker:
        patterns: ["*"]
